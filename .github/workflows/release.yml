name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: motif-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-13
            asset: motif-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: motif-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: motif-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "motif -> target"

      - name: Build
        run: cargo build --release -p motif-cli --target ${{ matrix.target }}

      - name: Prepare asset
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/motif.exe ${{ matrix.asset }}
          else
            cp target/${{ matrix.target }}/release/motif ${{ matrix.asset }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Motif ${{ github.ref_name }}"
          body: |
            **Motif** — Minimal, extensible Rust agent core (6 traits, 0 I/O).

            ### Quick install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Cashmeran/Motif/main/install.sh | bash
            ```
            ```powershell
            irm https://raw.githubusercontent.com/Cashmeran/Motif/main/install.ps1 | iex
            ```

            ### From source
            ```bash
            cargo install --git https://github.com/Cashmeran/Motif.git motif-cli
            ```
          files: ${{ matrix.asset }}
